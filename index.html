<style>
  :root{
    --bg1:#1b1511; --bg2:#231a14; --card:#241c16; --card2:#2a211a;
    --line:#3a2e25; --soft:#2e241c;
    --ink:#f2e9dd; --muted:#a89a8a;
    --accent:#cf7d54; --accent-deep:#b1623c; --gold:#d6af5e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); min-height:100vh; overflow-x:hidden;
    display:flex; align-items:center; justify-content:center; padding:18px;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
  }
  .serif{font-family:Georgia,"Times New Roman",serif}
  .glow{position:fixed;border-radius:50%;filter:blur(90px);z-index:0;pointer-events:none}
  .g1{width:400px;height:400px;background:rgba(207,125,84,.30);top:-130px;left:-110px;animation:breathe 12s ease-in-out infinite}
  .g2{width:360px;height:360px;background:rgba(214,175,94,.22);bottom:-140px;right:-100px;animation:breathe 15s ease-in-out infinite reverse}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.13);opacity:1}}
  .wrap{width:100%;max-width:440px;position:relative;z-index:2}
  .panel{background:var(--card);border-radius:26px;box-shadow:0 28px 64px rgba(0,0,0,.55);padding:30px 24px;border:1px solid rgba(255,255,255,.06)}
  .screen{animation:fadein .5s ease both}
  @keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .back{background:none;border:none;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer}
  .back:hover{color:var(--ink)}
  .step{font-size:11px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;font-weight:600}
  .track{height:5px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-bottom:26px}
  .fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .55s cubic-bezier(.4,0,.2,1)}
  h1{font-size:39px;line-height:1.08;font-weight:400;margin-bottom:16px;letter-spacing:-.5px}
  h2{font-size:25px;line-height:1.15;font-weight:400;margin-bottom:6px;letter-spacing:-.3px}
  .accent{color:var(--accent)}
  .sub{color:var(--muted);font-size:15px;margin-bottom:24px;line-height:1.55}
  .pill{display:inline-block;margin-bottom:20px;padding:7px 16px;border-radius:99px;border:1px solid var(--line);background:var(--soft);color:var(--gold);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
  .opt{display:flex;align-items:center;gap:15px;width:100%;padding:15px;border-radius:18px;border:1px solid var(--line);background:var(--card2);text-align:left;color:var(--ink);font-size:16px;font-weight:600;cursor:pointer;margin-bottom:11px;transition:transform .18s,box-shadow .22s,border-color .22s,background .22s;animation:optin .45s both}
  @keyframes optin{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
  .opt:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(0,0,0,.45);border-color:rgba(207,125,84,.6)}
  .opt:active{transform:scale(.98)}
  .opt.chosen{border-color:var(--accent);background:#33271e}
  .ico{flex:none;width:48px;height:48px;border-radius:14px;background:var(--soft);display:flex;align-items:center;justify-content:center;color:var(--accent)}
  .ico svg{width:22px;height:22px}
  label{display:block;font-size:13px;color:var(--muted);font-weight:600;margin-bottom:8px;letter-spacing:.3px}
  input{width:100%;background:var(--soft);border:1px solid var(--line);border-radius:16px;padding:15px;color:var(--ink);font-size:16px;margin-bottom:16px}
  input::placeholder{color:#7d6f60}
  input:focus{outline:none;border-color:var(--accent);background:#332820}
  .err{color:#e88a6a;font-size:14px;font-weight:600;margin-bottom:12px}
  .cta{width:100%;border:none;border-radius:16px;padding:17px;font-size:17px;font-weight:700;color:#241c16;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--gold));box-shadow:0 14px 30px rgba(207,125,84,.32);transition:transform .16s,box-shadow .22s;letter-spacing:.2px}
  .cta:hover{transform:translateY(-2px);box-shadow:0 18px 38px rgba(207,125,84,.42)}
  .cta:active{transform:scale(.98)}
  .note{color:#7d6f60;font-size:12px;text-align:center;margin-top:16px}
  .center{text-align:center}
  .seal{width:88px;height:88px;border-radius:50%;margin:4px auto 16px;display:flex;align-items:center;justify-content:center;color:#241c16;background:linear-gradient(135deg,var(--accent),var(--gold));box-shadow:0 16px 34px rgba(207,125,84,.45);animation:sealin .7s cubic-bezier(.2,1.1,.4,1) both}
  .seal svg{width:38px;height:38px}
  @keyframes sealin{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
  .divider{width:54px;height:2px;margin:14px auto;border-radius:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:grow .8s ease both;animation-delay:.25s}
  @keyframes grow{from{width:0;opacity:0}to{width:54px;opacity:1}}
  .resultcard{background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:18px;margin:18px 0;text-align:left}
  .resultcard .rotulo{color:var(--gold);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
  .resultcard .brief{color:var(--ink);font-size:15px;line-height:1.6}
  .whats{width:100%;border:none;border-radius:16px;padding:17px;font-size:17px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;text-decoration:none;background:linear-gradient(135deg,#25C065,#179a4e);box-shadow:0 14px 30px rgba(31,157,87,.4);transition:transform .16s}
  .whats:hover{transform:translateY(-2px)}
  .whats svg{width:22px;height:22px}

  /* V2: opção com título + descrição empilhados */
  .opt .txt{display:flex;flex-direction:column;gap:3px;min-width:0}
  .opt .t{font-weight:700;font-size:15.5px;line-height:1.25}
  .opt .d{font-weight:500;font-size:12.5px;color:var(--muted);line-height:1.35}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--muted);font-weight:600;margin-bottom:7px}
  .field input{width:100%;padding:15px;border-radius:14px;border:1px solid var(--line);background:var(--card2);color:var(--ink);font-size:16px;outline:none;transition:border-color .2s}
  .field input:focus{border-color:var(--accent)}
</style>

</head>
<body>
<div class="glow g1"></div><div class="glow g2"></div>
<div class="wrap"><div class="panel" id="app"></div></div>
<script>
var CORRETOR_NOME = "Jéssica";
var WHATSAPP_NUMERO = "5583993043512";
var ENDPOINT = "https://script.google.com/macros/s/AKfycbwtN9S6f-gFYGbJdVAn3WDsjnpG8LBOoy4kUEHJGTtiuEvVOwdFA-84pPoN2nkvYjmRyA/exec";
var PREVIEW = /[?&]preview=1/.test(location.search);

var ORIGEM = (function(){
  var p = new URLSearchParams(window.location.search);
  return {
    origem:   p.get("utm_source")   || "direto",
    campanha: p.get("utm_campaign") || "",
    conjunto: p.get("utm_content")  || "",
    anuncio:  p.get("utm_term")     || ""
  };
})();

var FAIXAS = {
  B1:{k:"B1",label:"até R$ 400 mil"},
  B2:{k:"B2",label:"R$ 400 mil a R$ 600 mil"},
  B3:{k:"B3",label:"R$ 600 mil a R$ 1 milhão"},
  B4:{k:"B4",label:"R$ 1 milhão a R$ 2 milhões"},
  B5:{k:"B5",label:"acima de R$ 2 milhões"}
};
var MATRIZ = {
  aberto:      { "1q":["B1","B2","B3"], "2q":["B2","B3","B4"], "3q":["B2","B3","B4","B5"], cobertura:["B3","B4","B5"] },
  bancarios:   { "1q":["B1","B2"],      "2q":["B1","B2","B3"], "3q":["B1","B2","B3"],      cobertura:["B2","B3"] },
  bessa:       { "1q":["B1","B2"],      "2q":["B2","B3","B4"], "3q":["B2","B3","B4"],      cobertura:["B3","B4","B5"] },
  manaira:     { "1q":["B1","B2"],      "2q":["B2","B3","B4"], "3q":["B2","B3","B4"],      cobertura:["B3","B4","B5"] },
  tambau:      { "1q":["B2","B3"],      "2q":["B2","B3"],      "3q":["B3","B4"],           cobertura:["B3","B4"] },
  cabo_branco: { "1q":["B2","B3"],      "2q":["B2","B3","B4"], "3q":["B3","B4","B5"],      cobertura:["B4","B5"] },
  altiplano:   { "1q":[],               "2q":["B3","B4"],      "3q":["B3","B4","B5"],      cobertura:["B4","B5"] },
  intermares:  { "1q":["B1","B2"],      "2q":["B2","B3"],      "3q":["B2","B3","B4"],      cobertura:["B3","B4"] }
};
var REGIOES = [
  {k:"bessa",       t:"Bessa / Jardim Oceania", d:"praia no dia a dia"},
  {k:"manaira",     t:"Manaíra",              d:"o m² mais desejado de JP"},
  {k:"tambau",      t:"Tambaú",               d:"tradição à beira-mar"},
  {k:"cabo_branco", t:"Cabo Branco",           d:"orla nobre"},
  {k:"altiplano",   t:"Altiplano",             d:"alto padrão"},
  {k:"intermares",  t:"Intermares / Ponta de Campina", d:"praia com espaço pra crescer"},
  {k:"bancarios",   t:"Bancários",            d:"melhor custo-benefício"},
  {k:"aberto",      t:"Prefiro sugestões",    d:"me mostrem as melhores oportunidades"}
];
var TIPOS = [
  {k:"1q",        t:"1 quarto / studio / flat"},
  {k:"2q",        t:"2 quartos"},
  {k:"3q",        t:"3 quartos ou mais"},
  {k:"cobertura", t:"Cobertura"}
];
var PRAZOS = [
  {k:"agora",       t:"Quero comprar agora"},
  {k:"3meses",      t:"Até 3 meses"},
  {k:"6meses",      t:"Até 6 meses"},
  {k:"pesquisando", t:"Só pesquisando"}
];
var LABELS = {
  aberto:"região indiferente", bessa:"Bessa/Jd Oceania", manaira:"Manaíra", tambau:"Tambaú",
  cabo_branco:"Cabo Branco", altiplano:"Altiplano", bancarios:"Bancários", intermares:"Intermares/Pta de Campina",
  "1q":"1 quarto","2q":"2 quartos","3q":"3 quartos ou mais",cobertura:"cobertura",
  B1:FAIXAS.B1.label,B2:FAIXAS.B2.label,B3:FAIXAS.B3.label,B4:FAIXAS.B4.label,B5:FAIXAS.B5.label,
  agora:"decisão imediata","3meses":"até 3 meses","6meses":"até 6 meses",pesquisando:"pesquisando",
  pronto:"pronto para morar", planta:"na planta / em construção", tanto_faz:"pronto ou na planta"
};

function tiposVisiveis(regiao){
  return TIPOS.filter(function(t){ return (MATRIZ[regiao][t.k]||[]).length>0; });
}
function faixasVisiveis(regiao,tipo){
  return (MATRIZ[regiao][tipo]||[]).map(function(k){return FAIXAS[k];});
}

var S = { etapa:"regiao", regiao:null, tipo:null, faixa:null, fase:null, prazo:null, nome:"", tel:"", erro:"" };
var app = document.getElementById("app");
var TOTAL = 5;

function persona(){
  if(S.tipo==="1q" && S.faixa==="B1") return {t:"Investidor / Compacto", d:"Perfil de entrada inteligente: flats e studios com alto potencial de valorização e renda."};
  if(S.tipo==="cobertura" || S.faixa==="B4" || S.faixa==="B5") return {t:"Morar com Exclusividade", d:"Você quer um endereço à altura do seu padrão de vida."};
  if(S.faixa==="B1") return {t:"Conquista do Primeiro Lar", d:"O momento de realizar o sonho do imóvel próprio com inteligência."};
  return {t:"Seu Lar Ideal", d:"Um espaço pensado pra qualidade de vida no dia a dia."};
}
function briefTexto(){
  var s = LABELS[S.tipo]+", "+LABELS[S.regiao]+", faixa "+LABELS[S.faixa];
  if(S.tipo==="1q" && S.fase) s += " ("+LABELS[S.fase]+")";
  return s+", prazo: "+LABELS[S.prazo]+".";
}
function whatsLink(){
  var p=persona();
  var msg="Olá "+CORRETOR_NOME+"! Fiz o quiz e quero receber minhas opções de imóveis. Perfil: "+p.t+". Procuro: "+briefTexto()+" Meu nome é "+S.nome+".";
  return "https://wa.me/"+WHATSAPP_NUMERO+"?text="+encodeURIComponent(msg);
}

function header(step,titulo,sub){
  var pct = Math.round(step/TOTAL*100);
  return '<div class="topbar">'+(step>1?'<button class="back" onclick="voltar()">← voltar</button>':'<span></span>')+
    '<span class="step">PASSO '+step+' DE '+TOTAL+'</span></div>'+
    '<div class="track"><div class="fill" style="width:'+pct+'%"></div></div>'+
    '<h2 class="serif" style="font-size:24px;margin-bottom:6px">'+titulo+'</h2>'+
    (sub?'<p style="color:var(--muted);font-size:14px;margin-bottom:18px">'+sub+'</p>':'<div style="height:12px"></div>');
}
function opts(list,fn){
  return '<div class="opts">'+list.map(function(o){
    return '<button class="opt" onclick="'+fn+'(this,\''+o.k+'\')"><span class="txt"><span class="t">'+(o.t||o.label)+'</span>'+(o.d?'<span class="d">'+o.d+'</span>':'')+'</span></button>';
  }).join("")+'</div>';
}

var _lastEtapaTracked = null;
function trackEtapa(){
  try{
    if(PREVIEW || S.etapa===_lastEtapaTracked) return;
    _lastEtapaTracked = S.etapa;
    fbq("trackCustom","QuizEtapa_"+S.etapa,{});
  }catch(e){}
}
function render(){
  trackEtapa();
  if(S.etapa==="regiao"){
    app.innerHTML='<div class="screen">'+
      '<p class="step" style="margin-bottom:10px">QUIZ RÁPIDO · 20 SEGUNDOS · RECEBA SUA SELEÇÃO NO WHATSAPP</p>'+
      header(1,"Onde você quer morar (ou investir) em João Pessoa?","Regiões com estoque real hoje:")+
      opts(REGIOES,"pickRegiao")+
      '<p class="note">Corretora Jéssica Araújo · CRECI 3694 · @jessicafaraujocorretora</p>'+
      '</div>';
    return;
  }
  if(S.etapa==="tipo"){
    var lista=tiposVisiveis(S.regiao);
    var nota = (S.regiao==="altiplano") ? '<p style="color:var(--muted);font-size:12.5px;margin-top:12px">Para o Altiplano, trabalhamos com 2 quartos, 3 quartos ou alto padrão.</p>' : '';
    app.innerHTML='<div class="screen">'+header(2,"Que tipo de imóvel?","")+opts(lista,"pickTipo")+nota+'</div>';
    return;
  }
  if(S.etapa==="faixa"){
    var fx=faixasVisiveis(S.regiao,S.tipo).map(function(f){return {k:f.k,t:f.label};});
    var micro="";
    if((S.tipo==="2q"||S.tipo==="3q") && S.regiao!=="bancarios"){
      micro='<p style="color:var(--muted);font-size:12.5px;margin-top:12px">Para até R$ 400 mil em 2–3 quartos, nosso estoque concentra-se na região dos Bancários.</p>';
    }
    app.innerHTML='<div class="screen">'+header(3,"Qual faixa de investimento?","Faixas com produto real pra essa combinação:")+opts(fx,"pickFaixa")+micro+'</div>';
    return;
  }
  if(S.etapa==="fase"){
    var ops=[{k:"pronto",t:"Pronto para morar"},{k:"planta",t:"Na planta / em construção",d:"melhores condições de entrada"},{k:"tanto_faz",t:"Tanto faz"}];
    app.innerHTML='<div class="screen">'+header(3,"Pronto ou na planta?","Pra flats e studios, isso muda as opções:")+opts(ops,"pickFase")+'</div>';
    return;
  }
  if(S.etapa==="prazo"){
    app.innerHTML='<div class="screen">'+header(4,"Pra quando é a compra?","")+opts(PRAZOS,"pickPrazo")+'</div>';
    return;
  }
  if(S.etapa==="contato"){
    app.innerHTML='<div class="screen">'+header(5,"Pra onde enviamos sua seleção?","Seus dados ficam só com a corretora. Zero spam.")+
      '<div class="field"><label>Seu nome</label><input id="nome" type="text" placeholder="Como podemos te chamar?" value="'+S.nome+'"/></div>'+
      '<div class="field"><label>Seu WhatsApp</label><input id="tel" type="tel" placeholder="(83) 9 0000-0000" value="'+S.tel+'"/></div>'+
      (S.erro?'<p style="color:#e08b6d;font-size:13px;margin-bottom:10px">'+S.erro+'</p>':'')+
      '<button class="cta" onclick="enviar()">Receber minha seleção →</button>'+
      '<p style="color:var(--muted);font-size:12px;margin-top:12px;text-align:center">Ao enviar, você concorda em receber contato da corretora.</p></div>';
    return;
  }
  if(S.etapa==="fim"){
    var p=persona();
    app.innerHTML='<div class="screen" style="text-align:center">'+
      '<div style="font-size:40px;margin-bottom:10px">✨</div>'+
      '<p class="step" style="margin-bottom:8px">SEU PERFIL</p>'+
      '<h2 class="serif" style="font-size:26px;color:var(--gold);margin-bottom:8px">'+p.t+'</h2>'+
      '<p style="color:var(--muted);font-size:14.5px;margin-bottom:8px">'+p.d+'</p>'+
      '<p style="font-size:14px;margin-bottom:22px">'+briefTexto()+'</p>'+
      '<a class="cta" style="display:block;text-decoration:none;text-align:center" href="'+whatsLink()+'">Falar com a '+CORRETOR_NOME+' no WhatsApp →</a>'+
      '<p style="color:var(--muted);font-size:12px;margin-top:14px">'+CORRETOR_NOME+' Araújo · CRECI 3694</p></div>';
    return;
  }
}

function chosen(btn){ btn.classList.add("chosen"); }
function pickRegiao(b,k){ chosen(b); S.regiao=k; setTimeout(function(){S.etapa="tipo";render();},220); }
function pickTipo(b,k){ chosen(b); S.tipo=k; setTimeout(function(){S.etapa="faixa";render();},220); }
function pickFaixa(b,k){ chosen(b); S.faixa=k; setTimeout(function(){ S.etapa=(S.tipo==="1q")?"fase":"prazo"; render(); },220); }
function pickFase(b,k){ chosen(b); S.fase=k; setTimeout(function(){S.etapa="prazo";render();},220); }
function pickPrazo(b,k){ chosen(b); S.prazo=k; setTimeout(function(){S.etapa="contato";render();},220); }
function voltar(){
  var ordem=["regiao","tipo","faixa"].concat(S.tipo==="1q"?["fase"]:[]).concat(["prazo","contato"]);
  var i=ordem.indexOf(S.etapa);
  S.etapa = i>0 ? ordem[i-1] : "regiao"; render();
}

function uuid(){ return "ld-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,10); }
function enviar(){
  var nome=document.getElementById("nome").value.trim();
  var tel=document.getElementById("tel").value.replace(/\D/g,"");
  if(nome.length<2){S.erro="Escreve seu nome pra corretora saber com quem fala :)";render();return;}
  if(tel.length<10){S.erro="Confere o WhatsApp — precisa do DDD.";render();return;}
  if(tel.length>11){S.erro="Confere o WhatsApp \u2014 n\u00famero com d\u00edgitos demais.";render();return;}
  if(/^(\d)\1+$/.test(tel.slice(2))){S.erro="Esse n\u00famero n\u00e3o parece v\u00e1lido \u2014 confere o WhatsApp :)";render();return;}
  if(/(0123456789|1234567890|9876543210)/.test(tel)){S.erro="Esse n\u00famero n\u00e3o parece v\u00e1lido \u2014 confere o WhatsApp :)";render();return;}
  if(tel.length===11 && tel.charAt(2)!=="9"){S.erro="Celular com DDD deve come\u00e7ar com 9 ap\u00f3s o DDD.";render();return;}
  S.nome=nome; S.tel=tel; S.erro="";

  var eventId = uuid();
  var p = persona();
  var payload = {
    nome:S.nome, whatsapp:"("+tel.slice(0,2)+") "+tel.slice(2,7)+"-"+tel.slice(7),
    perfil:p.t,
    objetivo:(S.tipo==="1q"&&S.faixa==="B1")?"investir":"morar",
    regiao:LABELS[S.regiao], faixa:LABELS[S.faixa], tipo:LABELS[S.tipo],
    prazo:LABELS[S.prazo], fase:(S.tipo==="1q"?LABELS[S.fase||"tanto_faz"]:""),
    event_id:eventId,
    origem:ORIGEM.origem, campanha:ORIGEM.campanha, conjunto:ORIGEM.conjunto, anuncio:ORIGEM.anuncio
  };

  if(!PREVIEW){
    try{
      fbq("track","Lead",{content_name:"quiz_imovel_v2"},{eventID:eventId});
      var qualificado = (S.faixa!=="B1") || (S.tipo==="1q");
      if(qualificado) fbq("trackCustom","LeadQualificado",{faixa:S.faixa,tipo:S.tipo},{eventID:"q-"+eventId});
      var body="data="+encodeURIComponent(JSON.stringify(payload));
      var sent=false;
      if(navigator.sendBeacon){
        try{ sent = navigator.sendBeacon(ENDPOINT, new Blob([body],{type:"application/x-www-form-urlencoded"})); }catch(e){ sent=false; }
      }
      if(!sent){ fetch(ENDPOINT,{method:"POST",mode:"no-cors",keepalive:true,headers:{"Content-Type":"application/x-www-form-urlencoded"},body:body}); }
    }catch(e){}
  } else {
    console.log("[PREVIEW] payload que seria enviado:",payload);
  }
  S.etapa="fim"; render();
}

render();
</script>
</body>
</html>

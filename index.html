<style>
  :root{
    --bg1:#1b1511; --bg2:#231a14; --card:#241c16; --card2:#2a211a;

    --ink:#f2e9dd; --muted:#a89a8a;
    --accent:#cf7d54; --accent-deep:#b1623c; --gold:#d6af5e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

  }
  .serif{font-family:Georgia,"Times New Roman",serif}
  .glow{position:fixed;border-radius:50%;filter:blur(90px);z-index:0;pointer-events:none}
  .g1{width:400px;height:400px;background:rgba(207,125,84,.30);top:-130px;left:-110px;animation:breathe 12s ease-in-out infinite}
  .g2{width:360px;height:360px;background:rgba(214,175,94,.22);bottom:-140px;right:-100px;animation:breathe 15s ease-in-out infinite reverse}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.13);opacity:1}}
  .wrap{width:100%;max-width:440px;position:relative;z-index:2}
  .panel{background:var(--card);border-radius:26px;box-shadow:0 28px 64px rgba(0,0,0,.55);padding:30px 24px;border:1px solid rgba(255,255,255,.06)}
  .screen{animation:fadein .5s ease both}
  @keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .back{background:none;border:none;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer}
  .back:hover{color:var(--ink)}
  .step{font-size:11px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;font-weight:600}
  .track{height:5px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-bottom:26px}
  .fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .55s cubic-bezier(.4,0,.2,1)}
  h1{font-size:39px;line-height:1.08;font-weight:400;margin-bottom:16px;letter-spacing:-.5px}
  h2{font-size:25px;line-height:1.15;font-weight:400;margin-bottom:6px;letter-spacing:-.3px}
  .accent{color:var(--accent)}
  .sub{color:var(--muted);font-size:15px;margin-bottom:24px;line-height:1.55}
  .pill{display:inline-block;margin-bottom:20px;padding:7px 16px;border-radius:99px;border:1px solid var(--line);background:var(--soft);color:var(--gold);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
  .opt{display:flex;align-items:center;gap:15px;width:100%;padding:15px;border-radius:18px;border:1px solid var(--line);background:var(--card2);text-align:left;color:var(--ink);font-size:16px;font-weight:600;cursor:pointer;margin-bottom:11px;transition:transform .18s,box-shadow .22s,border-color .22s,background .22s;animation:optin .45s both}
  @keyframes optin{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
  .opt:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(0,0,0,.45);border-color:rgba(207,125,84,.6)}
  .opt:active{transform:scale(.98)}
  .opt.chosen{border-color:var(--accent);background:#33271e}
  .ico{flex:none;width:48px;height:48px;border-radius:14px;background:var(--soft);display:flex;align-items:center;justify-content:center;color:var(--accent)}
  .ico svg{width:22px;height:22px}
  label{display:block;font-size:13px;color:var(--muted);font-weight:600;margin-bottom:8px;letter-spacing:.3px}
  input{width:100%;background:var(--soft);border:1px solid var(--line);border-radius:16px;padding:15px;color:var(--ink);font-size:16px;margin-bottom:16px}
  input::placeholder{color:#7d6f60}
  input:focus{outline:none;border-color:var(--accent);background:#332820}
  .err{color:#e88a6a;font-size:14px;font-weight:600;margin-bottom:12px}
  .cta{width:100%;border:none;border-radius:16px;padding:17px;font-size:17px;font-weight:700;color:#241c16;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--gold));box-shadow:0 14px 30px rgba(207,125,84,.32);transition:transform .16s,box-shadow .22s;letter-spacing:.2px}
  .cta:hover{transform:translateY(-2px);box-shadow:0 18px 38px rgba(207,125,84,.42)}
  .cta:active{transform:scale(.98)}
  .note{color:#7d6f60;font-size:12px;text-align:center;margin-top:16px}
  .center{text-align:center}
  .seal{width:88px;height:88px;border-radius:50%;margin:4px auto 16px;display:flex;align-items:center;justify-content:center;color:#241c16;background:linear-gradient(135deg,var(--accent),var(--gold));box-shadow:0 16px 34px rgba(207,125,84,.45);animation:sealin .7s cubic-bezier(.2,1.1,.4,1) both}
  .seal svg{width:38px;height:38px}
  @keyframes sealin{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
  .divider{width:54px;height:2px;margin:14px auto;border-radius:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:grow .8s ease both;animation-delay:.25s}
  @keyframes grow{from{width:0;opacity:0}to{width:54px;opacity:1}}
  .resultcard{background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:18px;margin:18px 0;text-align:left}
  .resultcard .rotulo{color:var(--gold);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
  .resultcard .brief{color:var(--ink);font-size:15px;line-height:1.6}
  .whats{width:100%;border:none;border-radius:16px;padding:17px;font-size:17px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;text-decoration:none;background:linear-gradient(135deg,#25C065,#179a4e);box-shadow:0 14px 30px rgba(31,157,87,.4);transition:transform .16s}
  .whats:hover{transform:translateY(-2px)}
  .whats svg{width:22px;height:22px}
</style>
</head>
<body>
<div class="glow g1"></div><div class="glow g2"></div>
<div class="wrap"><div class="panel" id="app"></div></div>
<script>
var CORRETOR_NOME = "J\u00e9ssica";
var WHATSAPP_NUMERO = "5583993043512";
var SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbwtN9S6f-gFYGbJdVAn3WDsjnpG8LBOoy4kUEHJGTtiuEvVOwdFA-84pPoN2nkvYjmRyA/exec";

var ORIGEM = (function(){
  var p = new URLSearchParams(window.location.search);
  return {
    origem:   p.get("utm_source")   || "direto",
    campanha: p.get("utm_campaign") || "",
    conjunto: p.get("utm_content")  || "",
    anuncio:  p.get("utm_term")     || ""
  };
})();

var I = {
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>',
  trend:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
  pin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
  wallet:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M16 12h.01"/></svg>',
  bed:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2 20v-8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v8"/><path d="M2 16h20M6 10V7a2 2 0 0 1 2-2h2"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>',
  card:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>',
  key:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="7.5" cy="15.5" r="4.5"/><path d="M10.5 12.5L20 3M16 7l3 3M14 9l2 2"/></svg>',
  msg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-9 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.2A8.5 8.5 0 0 1 12 3a8.38 8.38 0 0 1 9 8.5z"/></svg>'
};

var PERGUNTAS = [
  { key:"purpose", titulo:"Qual o seu objetivo?", subtitulo:"Isso muda tudo na busca.",
    opcoes:[{v:"morar",l:"Morar",i:"home"},{v:"investir",l:"Investir",i:"trend"},{v:"decidindo",l:"Ainda decidindo",i:"search"}] },
  { key:"region", titulo:"Qual regiao te atrai mais?", subtitulo:"Marque a sua preferida. Buscamos onde voc\u00ea quiser.",
    opcoes:[{v:"bessa",l:"Bessa",i:"pin"},{v:"cabobranco",l:"Cabo Branco",i:"pin"},{v:"tambau",l:"Tambaú / Manaíra",i:"pin"},{v:"outra",l:"Outra / Indiferente",i:"pin"}] },
  { key:"type", titulo:"Que tipo de imóvel procura?", subtitulo:"A tipologia ideal pra voc\u00ea.",
    opcoes:[{v:"1q",l:"1 quarto",i:"bed"},{v:"2q",l:"2 quartos",i:"bed"},{v:"3q",l:"3 quartos ou mais",i:"bed"},{v:"cobertura",l:"Cobertura",i:"bed"}] },
  { key:"price", titulo:"Qual faixa de investimento?", subtitulo:"",
    opcoes:[{v:"ate400",l:"Até R$ 400 mil",i:"wallet"},{v:"400a600",l:"R$ 400 mil a R$ 600 mil",i:"wallet"},{v:"600a1m",l:"R$ 600 mil a R$ 1 milh\u00e3o",i:"wallet"},{v:"acima1m",l:"Acima de R$ 1 milh\u00e3o",i:"wallet"}] }
];

var LABELS = {
  morar:"morar", investir:"investir", decidindo:"ainda decidindo",
  bessa:"Bessa", cabobranco:"Cabo Branco", tambau:"Tambaú/Manaíra", outra:"regi\u00e3o indiferente",
  ate400:"até R$ 400 mil", "400a600":"R$ 400 mil a R$ 600 mil", "600a1m":"R$ 600 mil a R$ 1 milh\u00e3o", acima1m:"acima de R$ 1 milh\u00e3o",
  "1q":"1 quarto", "2q":"2 quartos", "3q":"3 quartos ou mais", cobertura:"cobertura",
  agora:"decis\u00e3o imediata", "3meses":"até 3 meses", pesquisando:"pesquisando",
  avista:"à vista", financiamento:"financiamento", fgts:"uso de FGTS", naosei:"forma a definir"
};

var S = { etapa:"intro", idx:0, respostas:{}, nome:"", tel:"", erro:"" };
var app = document.getElementById("app");

function persona(r){
  if(r.purpose==="investir"){
    if(r.price==="600a1m"||r.price==="acima1m")
      return {t:"Investidor de Alto Padr\u00e3o", d:"Voc\u00ea busca ativos sólidos, bem localizados e com forte potencial de valorizacao."};
    return {t:"Investidor Estratégico", d:"Voc\u00ea procura boa entrada e rentabilidade consistente no médio prazo."};
  }
  if(r.purpose==="morar"){
    if(r.type==="cobertura"||r.price==="acima1m")
      return {t:"Morar com Exclusividade", d:"Voc\u00ea quer um endere\u00e7o \u00e0 altura do seu padr\u00e3o de vida."};
    if(r.price==="ate400")
      return {t:"Conquista do Primeiro Lar", d:"O momento de realizar o sonho do imóvel próprio com intelig\u00eancia."};
    return {t:"Seu Lar Ideal", d:"Um espa\u00e7o pensado pra qualidade de vida no dia a dia."};
  }
  return {t:"Em Busca do Imóvel Certo", d:"Vou te ajudar a encontrar a melhor oportunidade pro seu momento."};
}

function briefTexto(r){
  return LABELS[r.type]+", "+LABELS[r.region]+", faixa "+LABELS[r.price]+", pra "+LABELS[r.purpose]+".";
}

function whatsLink(){
  var p=persona(S.respostas);
  var msg="Ol\u00e1 "+CORRETOR_NOME+"! Fiz o quiz e quero receber minhas opções de imóveis. "+
    "Perfil: "+p.t+". Procuro: "+briefTexto(S.respostas)+" Meu nome é "+S.nome+".";
  return "https://wa.me/"+WHATSAPP_NUMERO+"?text="+encodeURIComponent(msg);
}

function pick(btn,key,v){
  btn.classList.add("chosen");
  setTimeout(function(){ responder(key,v); }, 200);
}
function responder(key,v){
  S.respostas[key]=v;
  if(S.idx+1<PERGUNTAS.length){S.idx++;} else {S.etapa="lead";}
  render();
}
function voltar(){
  if(S.etapa==="lead"){S.etapa="quiz";render();return;}
  if(S.idx>0){S.idx--;} else {S.etapa="intro";}
  render();
}
function saveLead(){
  if(!SHEET_ENDPOINT) return;
  var p=persona(S.respostas);
  var payload={
    nome:S.nome, whatsapp:S.tel, perfil:p.t,
    objetivo:LABELS[S.respostas.purpose], regiao:LABELS[S.respostas.region],
    faixa:LABELS[S.respostas.price], tipo:LABELS[S.respostas.type],
    
    origem:ORIGEM.origem, campanha:ORIGEM.campanha, conjunto:ORIGEM.conjunto, anuncio:ORIGEM.anuncio
  };
  var body="data="+encodeURIComponent(JSON.stringify(payload));
  var ok=false;
  try{
    if(navigator.sendBeacon){
      var blob=new Blob([body],{type:"application/x-www-form-urlencoded"});
      ok=navigator.sendBeacon(SHEET_ENDPOINT,blob);
    }
  }catch(e){}
  if(!ok){
    try{
      fetch(SHEET_ENDPOINT,{method:"POST",mode:"no-cors",keepalive:true,headers:{"Content-Type":"application/x-www-form-urlencoded"},body:body});
    }catch(e){}
  }
}
function mascaraTel(v){
  var d=v.replace(/\D/g,"").slice(0,11);
  if(d.length<=2) return d.length?"("+d:"";
  if(d.length<=6) return "("+d.slice(0,2)+") "+d.slice(2);
  if(d.length<=10) return "("+d.slice(0,2)+") "+d.slice(2,6)+"-"+d.slice(6);
  return "("+d.slice(0,2)+") "+d.slice(2,7)+"-"+d.slice(7);
}
function enviar(){
  S.nome=document.getElementById("nome").value;
  S.tel=document.getElementById("tel").value;
  var digits=S.tel.replace(/\D/g,"");
  if(S.nome.trim().length<2){S.erro="Digite seu nome.";render();return;}
  if(digits.length<10){S.erro="Digite um WhatsApp válido com DDD.";render();return;}
  S.erro=""; saveLead(); try{ if(window.fbq) fbq("track","Lead",{content_name:persona(S.respostas).t}); }catch(e){} S.etapa="resultado"; render();
}

function render(){
  var total=PERGUNTAS.length;
  var prog = S.etapa==="lead"?100:Math.round((S.idx/total)*100);
  var html='<div class="screen">';

  if(S.etapa!=="intro" && S.etapa!=="resultado"){
    html+='<div class="topbar"><button class="back" onclick="voltar()">\u2190 Voltar</button>'+
      '<span class="step">'+(S.etapa==="lead"?"Quase lá":"Etapa "+(S.idx+1)+" de "+total)+'</span></div>'+
      '<div class="track"><div class="fill" style="width:'+prog+'%"></div></div>';
  }

  if(S.etapa==="intro"){
    html+='<div class="center" style="padding:26px 0">'+
      '<span class="pill">Jo\u00e3o Pessoa</span>'+
      '<h1 class="serif">Descubra o <span class="accent">imóvel ideal</span> pra voc\u00ea</h1>'+
      '<p class="sub">Responda algumas perguntas rápidas. Eu identifico o seu perfil e te envio uma sele\u00e7\u00e3o sob medida, direto no seu WhatsApp.</p>'+
      '<button class="cta" onclick="S.etapa=\'quiz\';render()">Come\u00e7ar</button>'+
      '<p class="note">Leva menos de 1 minuto.</p></div>';
  }

  else if(S.etapa==="quiz"){
    var q=PERGUNTAS[S.idx];
    html+='<h2 class="serif">'+q.titulo+'</h2><p class="sub">'+q.subtitulo+'</p>';
    q.opcoes.forEach(function(o,n){
      html+='<button class="opt" style="animation-delay:'+(n*0.06)+'s" onclick="pick(this,\''+q.key+'\',\''+o.v+'\')">'+
        '<span class="ico">'+I[o.i]+'</span><span>'+o.l+'</span></button>';
    });
  }

  else if(S.etapa==="lead"){
    html+='<h2 class="serif">Pronto. Sua sele\u00e7\u00e3o está a caminho.</h2>'+
      '<p class="sub">Para onde envio as opções que combinam com o seu perfil?</p>'+
      '<label>Seu nome</label><input id="nome" autocomplete="name" autocapitalize="words" placeholder="Como posso te chamar?" value="'+S.nome+'">'+
      '<label>Seu WhatsApp</label><input id="tel" type="tel" inputmode="numeric" autocomplete="tel" oninput="this.value=mascaraTel(this.value)" placeholder="(83) 9 9999-9999" value="'+S.tel+'">'+
      (S.erro?'<p class="err">'+S.erro+'</p>':'')+
      '<button class="cta" onclick="enviar()">Ver meu perfil</button>'+
      '<p class="note">Seus dados s\u00e3o usados apenas para o atendimento.</p>';
  }

  else if(S.etapa==="resultado"){
    var p=persona(S.respostas);
    html+='<div class="center" style="padding:6px 0">'+
      '<div class="seal">'+I.key+'</div>'+
      '<p class="sub" style="margin-bottom:2px">'+S.nome+', o seu perfil é</p>'+
      '<h2 class="serif accent" style="font-size:27px">'+p.t+'</h2>'+
      '<div class="divider"></div>'+
      '<p class="sub" style="margin:0 0 4px">'+p.d+'</p>'+
      '<div class="resultcard"><p class="rotulo">O que voc\u00ea procura</p><p class="brief">'+briefTexto(S.respostas)+'</p></div>'+
      '<p class="sub" style="margin-bottom:16px">Vou reunir as melhores opções pro seu perfil e enviar agora no seu WhatsApp.</p>'+
      '<a class="whats" href="'+whatsLink()+'" target="_blank" rel="noopener">'+I.msg+' Receber minhas opções</a>'+
      '<p class="note">Resposta personalizada com base nas suas respostas.</p></div>';
  }

  html+='</div>';
  app.innerHTML=html;
}

render();
</script>
</body>
</html>

  .glow{position:fixed;border-radius:50%;filter:blur(90px);z-index:0;pointer-events:none}
  .g1{width:400px;height:400px;background:rgba(207,125,84,.30);top:-130px;left:-110px;animation:breathe 12s ease-in-out infinite}
  .g2{width:360px;height:360px;background:rgba(214,175,94,.22);bottom:-140px;right:-100px;animation:breathe 15s ease-in-out infinite reverse}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.13);opacity:1}}
  .wrap{width:100%;max-width:440px;position:relative;z-index:2}
  .panel{background:var(--card);border-radius:26px;box-shadow:0 28px 64px rgba(0,0,0,.55);padding:30px 24px;border:1px solid rgba(255,255,255,.06)}
  .screen{animation:fadein .5s ease both}
  @keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .back{background:none;border:none;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer}
  .back:hover{color:var(--ink)}
  .step{font-size:11px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;font-weight:600}
  .track{height:5px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-bottom:26px}
  .fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .55s cubic-bezier(.4,0,.2,1)}
  h1{font-size:39px;line-height:1.08;font-weight:400;margin-bottom:16px;letter-spacing:-.5px}
  h2{font-size:25px;line-height:1.15;font-weight:400;margin-bottom:6px;letter-spacing:-.3px}
  .accent{color:var(--accent)}
  .sub{color:var(--muted);font-size:15px;margin-bottom:24px;line-height:1.55}
  .pill{display:inline-block;margin-bottom:20px;padding:7px 16px;border-radius:99px;border:1px solid var(--line);background:var(--soft);color:var(--gold);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
  .opt{display:flex;align-items:center;gap:15px;width:100%;padding:15px;border-radius:18px;border:1px solid var(--line);background:var(--card2);text-align:left;color:var(--ink);font-size:16px;font-weight:600;cursor:pointer;margin-bottom:11px;transition:transform .18s,box-shadow .22s,border-color .22s,background .22s;animation:optin .45s both}
  @keyframes optin{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
  .opt:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(0,0,0,.45);border-color:rgba(207,125,84,.6)}
  .opt:active{transform:scale(.98)}
  .opt.chosen{border-color:var(--accent);background:#33271e}
  .ico{flex:none;width:48px;height:48px;border-radius:14px;background:var(--soft);display:flex;align-items:center;justify-content:center;color:var(--accent)}
  .ico svg{width:22px;height:22px}
  label{display:block;font-size:13px;color:var(--muted);font-weight:600;margin-bottom:8px;letter-spacing:.3px}
  input{width:100%;background:var(--soft);border:1px solid var(--line);border-radius:16px;padding:15px;color:var(--ink);font-size:16px;margin-bottom:16px}
  input::placeholder{color:#7d6f60}
  input:focus{outline:none;border-color:var(--accent);background:#332820}
  .err{color:#e88a6a;font-size:14px;font-weight:600;margin-bottom:12px}
  .cta{width:100%;border:none;border-radius:16px;padding:17px;font-size:17px;font-weight:700;color:#241c16;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--gold));box-shadow:0 14px 30px rgba(207,125,84,.32);transition:transform .16s,box-shadow .22s;letter-spacing:.2px}
  .cta:hover{transform:translateY(-2px);box-shadow:0 18px 38px rgba(207,125,84,.42)}
  .cta:active{transform:scale(.98)}
  .note{color:#7d6f60;font-size:12px;text-align:center;margin-top:16px}
  .center{text-align:center}
  .seal{width:88px;height:88px;border-radius:50%;margin:4px auto 16px;display:flex;align-items:center;justify-content:center;color:#241c16;background:linear-gradient(135deg,var(--accent),var(--gold));box-shadow:0 16px 34px rgba(207,125,84,.45);animation:sealin .7s cubic-bezier(.2,1.1,.4,1) both}
  .seal svg{width:38px;height:38px}
  @keyframes sealin{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
  .divider{width:54px;height:2px;margin:14px auto;border-radius:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:grow .8s ease both;animation-delay:.25s}
  @keyframes grow{from{width:0;opacity:0}to{width:54px;opacity:1}}
  .resultcard{background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:18px;margin:18px 0;text-align:left}
  .resultcard .rotulo{color:var(--gold);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
  .resultcard .brief{color:var(--ink);font-size:15px;line-height:1.6}
  .whats{width:100%;border:none;border-radius:16px;padding:17px;font-size:17px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;text-decoration:none;background:linear-gradient(135deg,#25C065,#179a4e);box-shadow:0 14px 30px rgba(31,157,87,.4);transition:transform .16s}
  .whats:hover{transform:translateY(-2px)}
  .whats svg{width:22px;height:22px}
</style>
</head>
<body>
<div class="glow g1"></div><div class="glow g2"></div>
<div class="wrap"><div class="panel" id="app"></div></div>
<script>
var CORRETOR_NOME = "J\u00e9ssica";
var WHATSAPP_NUMERO = "5583993043512";
var SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbwtN9S6f-gFYGbJdVAn3WDsjnpG8LBOoy4kUEHJGTtiuEvVOwdFA-84pPoN2nkvYjmRyA/exec";

var ORIGEM = (function(){
  var p = new URLSearchParams(window.location.search);
  return {
    origem:   p.get("utm_source")   || "direto",
    campanha: p.get("utm_campaign") || "",
    conjunto: p.get("utm_content")  || "",
    anuncio:  p.get("utm_term")     || ""
  };
})();

var I = {
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>',
  trend:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
  pin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
  wallet:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M16 12h.01"/></svg>',
  bed:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2 20v-8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v8"/><path d="M2 16h20M6 10V7a2 2 0 0 1 2-2h2"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>',
  card:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>',
  key:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="7.5" cy="15.5" r="4.5"/><path d="M10.5 12.5L20 3M16 7l3 3M14 9l2 2"/></svg>',
  msg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-9 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.2A8.5 8.5 0 0 1 12 3a8.38 8.38 0 0 1 9 8.5z"/></svg>'
};

var PERGUNTAS = [
  { key:"purpose", titulo:"Qual o seu objetivo?", subtitulo:"Isso muda tudo na busca.",
    opcoes:[{v:"morar",l:"Morar",i:"home"},{v:"investir",l:"Investir",i:"trend"},{v:"decidindo",l:"Ainda decidindo",i:"search"}] },
  { key:"region", titulo:"Qual regiao te atrai mais?", subtitulo:"Marque a sua preferida. Buscamos onde voc\u00ea quiser.",
    opcoes:[{v:"bessa",l:"Bessa",i:"pin"},{v:"cabobranco",l:"Cabo Branco",i:"pin"},{v:"tambau",l:"Tambaú / Manaíra",i:"pin"},{v:"outra",l:"Outra / Indiferente",i:"pin"}] },
  { key:"price", titulo:"Qual faixa de investimento?", subtitulo:"Sem compromisso. Serve só pra acertar a selecao.",
    opcoes:[{v:"ate400",l:"Até R$ 400 mil",i:"wallet"},{v:"400a600",l:"R$ 400 mil a R$ 600 mil",i:"wallet"},{v:"600a1m",l:"R$ 600 mil a R$ 1 milh\u00e3o",i:"wallet"},{v:"acima1m",l:"Acima de R$ 1 milh\u00e3o",i:"wallet"}] },
  { key:"type", titulo:"Que tipo de imóvel procura?", subtitulo:"Pense no que faz sentido pro seu momento.",
    opcoes:[{v:"1q",l:"1 quarto",i:"bed"},{v:"2q",l:"2 quartos",i:"bed"},{v:"3q",l:"3 quartos ou mais",i:"bed"},{v:"cobertura",l:"Cobertura",i:"bed"}] },
  { key:"prazo", titulo:"Quando pretende decidir?", subtitulo:"Pra eu saber o n\u00edvel de prioridade.",
    opcoes:[{v:"agora",l:"Agora / o quanto antes",i:"clock"},{v:"3meses",l:"Nos próximos 3 meses",i:"clock"},{v:"pesquisando",l:"Só pesquisando",i:"clock"}] },
  { key:"pagamento", titulo:"Como pretende pagar?", subtitulo:"Última pergunta. Ajuda a separar as opções certas.",
    opcoes:[{v:"avista",l:"À vista",i:"card"},{v:"financiamento",l:"Financiamento",i:"card"},{v:"fgts",l:"Com uso de FGTS",i:"card"},{v:"naosei",l:"Ainda avaliando",i:"card"}] }
];

var LABELS = {
  morar:"morar", investir:"investir", decidindo:"ainda decidindo",
  bessa:"Bessa", cabobranco:"Cabo Branco", tambau:"Tambaú/Manaíra", outra:"regi\u00e3o indiferente",
  ate400:"até R$ 400 mil", "400a600":"R$ 400 mil a R$ 600 mil", "600a1m":"R$ 600 mil a R$ 1 milh\u00e3o", acima1m:"acima de R$ 1 milh\u00e3o",
  "1q":"1 quarto", "2q":"2 quartos", "3q":"3 quartos ou mais", cobertura:"cobertura",
  agora:"decis\u00e3o imediata", "3meses":"até 3 meses", pesquisando:"pesquisando",
  avista:"à vista", financiamento:"financiamento", fgts:"uso de FGTS", naosei:"forma a definir"
};

var S = { etapa:"intro", idx:0, respostas:{}, nome:"", tel:"", erro:"" };
var app = document.getElementById("app");

function persona(r){
  if(r.purpose==="investir"){
    if(r.price==="600a1m"||r.price==="acima1m")
      return {t:"Investidor de Alto Padr\u00e3o", d:"Voc\u00ea busca ativos sólidos, bem localizados e com forte potencial de valorizacao."};
    return {t:"Investidor Estratégico", d:"Voc\u00ea procura boa entrada e rentabilidade consistente no médio prazo."};
  }
  if(r.purpose==="morar"){
    if(r.type==="cobertura"||r.price==="acima1m")
      return {t:"Morar com Exclusividade", d:"Voc\u00ea quer um endere\u00e7o \u00e0 altura do seu padr\u00e3o de vida."};
    if(r.price==="ate400")
      return {t:"Conquista do Primeiro Lar", d:"O momento de realizar o sonho do imóvel próprio com intelig\u00eancia."};
    return {t:"Seu Lar Ideal", d:"Um espa\u00e7o pensado pra qualidade de vida no dia a dia."};
  }
  return {t:"Em Busca do Imóvel Certo", d:"Vou te ajudar a encontrar a melhor oportunidade pro seu momento."};
}

function briefTexto(r){
  return LABELS[r.type]+", "+LABELS[r.region]+", faixa "+LABELS[r.price]+
    ", pra "+LABELS[r.purpose]+", "+LABELS[r.prazo]+", pagamento "+LABELS[r.pagamento]+".";
}

function whatsLink(){
  var p=persona(S.respostas);
  var msg="Ol\u00e1 "+CORRETOR_NOME+"! Fiz o quiz e quero receber minhas opções de imóveis. "+
    "Perfil: "+p.t+". Procuro: "+briefTexto(S.respostas)+" Meu nome é "+S.nome+".";
  return "https://wa.me/"+WHATSAPP_NUMERO+"?text="+encodeURIComponent(msg);
}

function pick(btn,key,v){
  btn.classList.add("chosen");
  setTimeout(function(){ responder(key,v); }, 200);
}
function responder(key,v){
  S.respostas[key]=v;
  if(S.idx+1<PERGUNTAS.length){S.idx++;} else {S.etapa="lead";}
  render();
}
function voltar(){
  if(S.etapa==="lead"){S.etapa="quiz";render();return;}
  if(S.idx>0){S.idx--;} else {S.etapa="intro";}
  render();
}
function saveLead(){
  if(!SHEET_ENDPOINT) return;
  var p=persona(S.respostas);
  var payload={
    nome:S.nome, whatsapp:S.tel, perfil:p.t,
    objetivo:LABELS[S.respostas.purpose], regiao:LABELS[S.respostas.region],
    faixa:LABELS[S.respostas.price], tipo:LABELS[S.respostas.type],
    prazo:LABELS[S.respostas.prazo], pagamento:LABELS[S.respostas.pagamento],
    origem:ORIGEM.origem, campanha:ORIGEM.campanha, conjunto:ORIGEM.conjunto, anuncio:ORIGEM.anuncio
  };
  var body="data="+encodeURIComponent(JSON.stringify(payload));
  var ok=false;
  try{
    if(navigator.sendBeacon){
      var blob=new Blob([body],{type:"application/x-www-form-urlencoded"});
      ok=navigator.sendBeacon(SHEET_ENDPOINT,blob);
    }
  }catch(e){}
  if(!ok){
    try{
      fetch(SHEET_ENDPOINT,{method:"POST",mode:"no-cors",keepalive:true,headers:{"Content-Type":"application/x-www-form-urlencoded"},body:body});
    }catch(e){}
  }
}
function mascaraTel(v){
  var d=v.replace(/\D/g,"").slice(0,11);
  if(d.length<=2) return d.length?"("+d:"";
  if(d.length<=6) return "("+d.slice(0,2)+") "+d.slice(2);
  if(d.length<=10) return "("+d.slice(0,2)+") "+d.slice(2,6)+"-"+d.slice(6);
  return "("+d.slice(0,2)+") "+d.slice(2,7)+"-"+d.slice(7);
}
function enviar(){
  S.nome=document.getElementById("nome").value;
  S.tel=document.getElementById("tel").value;
  var digits=S.tel.replace(/\D/g,"");
  if(S.nome.trim().length<2){S.erro="Digite seu nome.";render();return;}
  if(digits.length<10){S.erro="Digite um WhatsApp válido com DDD.";render();return;}
  S.erro=""; saveLead(); try{ if(window.fbq) fbq("track","Lead",{content_name:persona(S.respostas).t}); }catch(e){} S.etapa="resultado"; render();
}

function render(){
  var total=PERGUNTAS.length;
  var prog = S.etapa==="lead"?100:Math.round((S.idx/total)*100);
  var html='<div class="screen">';

  if(S.etapa!=="intro" && S.etapa!=="resultado"){
    html+='<div class="topbar"><button class="back" onclick="voltar()">\u2190 Voltar</button>'+
      '<span class="step">'+(S.etapa==="lead"?"Quase lá":"Etapa "+(S.idx+1)+" de "+total)+'</span></div>'+
      '<div class="track"><div class="fill" style="width:'+prog+'%"></div></div>';
  }

  if(S.etapa==="intro"){
    html+='<div class="center" style="padding:26px 0">'+
      '<span class="pill">Jo\u00e3o Pessoa</span>'+
      '<h1 class="serif">Descubra o <span class="accent">imóvel ideal</span> pra voc\u00ea</h1>'+
      '<p class="sub">Responda algumas perguntas rápidas. Eu identifico o seu perfil e te envio uma sele\u00e7\u00e3o sob medida, direto no seu WhatsApp.</p>'+
      '<button class="cta" onclick="S.etapa=\'quiz\';render()">Come\u00e7ar</button>'+
      '<p class="note">Leva menos de 1 minuto.</p></div>';
  }

  else if(S.etapa==="quiz"){
    var q=PERGUNTAS[S.idx];
    html+='<h2 class="serif">'+q.titulo+'</h2><p class="sub">'+q.subtitulo+'</p>';
    q.opcoes.forEach(function(o,n){
      html+='<button class="opt" style="animation-delay:'+(n*0.06)+'s" onclick="pick(this,\''+q.key+'\',\''+o.v+'\')">'+
        '<span class="ico">'+I[o.i]+'</span><span>'+o.l+'</span></button>';
    });
  }

  else if(S.etapa==="lead"){
    html+='<h2 class="serif">Pronto. Sua sele\u00e7\u00e3o está a caminho.</h2>'+
      '<p class="sub">Para onde envio as opções que combinam com o seu perfil?</p>'+
      '<label>Seu nome</label><input id="nome" autocomplete="name" autocapitalize="words" placeholder="Como posso te chamar?" value="'+S.nome+'">'+
      '<label>Seu WhatsApp</label><input id="tel" type="tel" inputmode="numeric" autocomplete="tel" oninput="this.value=mascaraTel(this.value)" placeholder="(83) 9 9999-9999" value="'+S.tel+'">'+
      (S.erro?'<p class="err">'+S.erro+'</p>':'')+
      '<button class="cta" onclick="enviar()">Ver meu perfil</button>'+
      '<p class="note">Seus dados s\u00e3o usados apenas para o atendimento.</p>';
  }

  else if(S.etapa==="resultado"){
    var p=persona(S.respostas);
    html+='<div class="center" style="padding:6px 0">'+
      '<div class="seal">'+I.key+'</div>'+
      '<p class="sub" style="margin-bottom:2px">'+S.nome+', o seu perfil é</p>'+
      '<h2 class="serif accent" style="font-size:27px">'+p.t+'</h2>'+
      '<div class="divider"></div>'+
      '<p class="sub" style="margin:0 0 4px">'+p.d+'</p>'+
      '<div class="resultcard"><p class="rotulo">O que voc\u00ea procura</p><p class="brief">'+briefTexto(S.respostas)+'</p></div>'+
      '<p class="sub" style="margin-bottom:16px">Vou reunir as melhores opções pro seu perfil e enviar agora no seu WhatsApp.</p>'+
      '<a class="whats" href="'+whatsLink()+'" target="_blank" rel="noopener">'+I.msg+' Receber minhas opções</a>'+
      '<p class="note">Resposta personalizada com base nas suas respostas.</p></div>';
  }

  html+='</div>';
  app.innerHTML=html;
}

render();
</script>
</body>
</html>
